name: Apply Market Ranking Quality Fix

on:
  push:
    branches:
      - agent/fix-market-rankings-global-search
    paths:
      - "scripts/apply-market-ranking-quality-fix.mjs"
      - ".github/workflows/apply-market-ranking-quality-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-market-rankings-global-search
          fetch-depth: 0
      - run: node scripts/apply-market-ranking-quality-fix.mjs
      - run: npm ci
      - run: npm run check:market-ranking-parser
      - name: Commit patched files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/edinet-financial-parser.ts lib/edinet-parser.ts scripts/repair-market-ranking-data.ts
          git commit -m "Correct IFRS ranking values and repair retries"
          git push origin HEAD:agent/fix-market-rankings-global-search
