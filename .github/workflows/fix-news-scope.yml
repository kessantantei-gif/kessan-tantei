name: Fix news search scope

on:
  push:
    paths:
      - ".github/workflows/fix-news-scope.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix scope
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('app/news/page.tsx')
          text = path.read_text()
          text = text.replace(
              '  let currentPage = requestedPage;\n  let totalNewsCount = 0;\n\n  try {',
              '  let currentPage = requestedPage;\n  let totalNewsCount = 0;\n  let listedCompanies: CompanyMaster[] = [];\n\n  try {'
          )
          text = text.replace(
              '    const [marketTickers, listedCompanies, totalCount] = await Promise.all([',
              '    const [marketTickers, loadedCompanies, totalCount] = await Promise.all(['
          )
          text = text.replace(
              '    const companySearchTickers = await loadCompanySearchTickers(\n      query,\n      selectedMarket,\n      listedCompanies\n    );',
              '    listedCompanies = loadedCompanies;\n    const companySearchTickers = await loadCompanySearchTickers(\n      query,\n      selectedMarket,\n      listedCompanies\n    );'
          )
          path.write_text(text)
          Path('.github/workflows/fix-news-scope.yml').unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/news/page.tsx .github/workflows/fix-news-scope.yml
          git commit -m "Fix news search company scope"
          git push
