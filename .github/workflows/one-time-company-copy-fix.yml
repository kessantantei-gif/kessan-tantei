name: One-time company copy fix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/one-time-company-copy-fix.yml"

permissions:
  contents: write

jobs:
  fix-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Replace growth-only company copy
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/company/[ticker]/page.tsx")
          text = path.read_text()

          replacements = {
              "そのグロース株、本当に買って大丈夫ですか？": "決算データから成長性・収益性・キャッシュ・財務リスクを確認できます。",
              "グロース市場特化の財務分析ランキング。": "グロース・スタンダード・プライム対応の財務分析ランキング。",
              "財務スコアは高水準です。グロース市場の中では、成長性・収益品質・安全性のバランスが比較的良好です。": "財務スコアは高水準です。成長性・収益品質・安全性のバランスが比較的良好です。",
              "営業利益・営業CFともにマイナスです。グロース企業であっても、資金繰りと追加調達リスクには注意が必要です。": "営業利益・営業CFともにマイナスです。資金繰りと追加調達リスクには注意が必要です。",
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"置換対象が見つかりません: {old}")
              text = text.replace(old, new)

          path.write_text(text)
          Path(".github/workflows/one-time-company-copy-fix.yml").unlink()
          PY

      - name: Commit fixed copy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'app/company/[ticker]/page.tsx' '.github/workflows/one-time-company-copy-fix.yml'
          git commit -m "Update company page copy for all-market coverage"
          git push origin main
