name: Market Ranking Value Diagnostics

on:
  push:
    branches:
      - agent/fix-market-rankings-global-search
    paths:
      - "scripts/diagnose-market-ranking-values.ts"
      - ".github/workflows/market-ranking-value-diagnostics.yml"
  pull_request:
    paths:
      - "scripts/diagnose-market-ranking-values.ts"
      - ".github/workflows/market-ranking-value-diagnostics.yml"
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/diagnose-market-ranking-values.ts
      - uses: actions/upload-artifact@v4
        with:
          name: market-ranking-value-diagnostics
          path: reports/market-ranking-value-diagnostics.json
          if-no-files-found: error
          retention-days: 7
