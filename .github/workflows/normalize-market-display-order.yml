name: Normalize market display order

on:
  push:
    paths:
      - ".github/workflows/normalize-market-display-order.yml"

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize visible market order
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          roots = [Path("app"), Path("components"), Path("docs"), Path("lib")]
          extensions = {".ts", ".tsx", ".md", ".json"}

          replacements = [
              ("グロース・スタンダード・プライム", "プライム・スタンダード・グロース"),
              ("グロース、スタンダード、プライム", "プライム、スタンダード、グロース"),
              ("グロース／スタンダード／プライム", "プライム／スタンダード／グロース"),
              ("Growth・Standard・Prime", "Prime・Standard・Growth"),
              ("Growth / Standard / Prime", "Prime / Standard / Growth"),
              ('["growth", "standard", "prime"]', '["prime", "standard", "growth"]'),
              ("['growth', 'standard', 'prime']", "['prime', 'standard', 'growth']"),
              ('["growth","standard","prime"]', '["prime","standard","growth"]'),
          ]

          changed = []
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if not path.is_file() or path.suffix not in extensions:
                      continue
                  text = path.read_text()
                  updated = text
                  for old, new in replacements:
                      updated = updated.replace(old, new)

                  # Market selector tuples shown to users.
                  updated = updated.replace(
                      '["all", "全市場"],\n                ["growth", "グロース"],\n                ["standard", "スタンダード"],\n                ["prime", "プライム"],',
                      '["all", "全市場"],\n                ["prime", "プライム"],\n                ["standard", "スタンダード"],\n                ["growth", "グロース"],'
                  )

                  if updated != text:
                      path.write_text(updated)
                      changed.append(str(path))

          # marketList follows object insertion order, so make the canonical object Prime -> Standard -> Growth.
          markets = Path("lib/markets.ts")
          text = markets.read_text()
          blocks = {}
          for slug in ("growth", "standard", "prime"):
              match = re.search(rf"  {slug}: \{{.*?\n  \}},", text, flags=re.S)
              if not match:
                  raise SystemExit(f"market block not found: {slug}")
              blocks[slug] = match.group(0)
          start = text.index("  growth: {")
          end = text.index("} as const;")
          body = "\n".join([blocks["prime"], blocks["standard"], blocks["growth"]]) + "\n"
          updated = text[:start] + body + text[end:]
          if updated != text:
              markets.write_text(updated)
              changed.append(str(markets))

          print("changed files:")
          for path in sorted(set(changed)):
              print(path)
          PY

      - name: Add regression audit
        run: |
          cat > scripts/audit-market-display-order.ts <<'EOF'
          import fs from "node:fs";
          import path from "node:path";

          const roots = ["app", "components", "docs", "lib"];
          const extensions = new Set([".ts", ".tsx", ".md", ".json"]);
          const forbidden = [
            "グロース・スタンダード・プライム",
            "グロース、スタンダード、プライム",
            "グロース／スタンダード／プライム",
            "Growth・Standard・Prime",
            "Growth / Standard / Prime",
          ];

          function files(dir: string): string[] {
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const target = path.join(dir, entry.name);
              return entry.isDirectory() ? files(target) : extensions.has(path.extname(target)) ? [target] : [];
            });
          }

          const errors: string[] = [];
          for (const file of roots.flatMap(files)) {
            const text = fs.readFileSync(file, "utf8");
            for (const phrase of forbidden) {
              if (text.includes(phrase)) errors.push(`${file}: ${phrase}`);
            }
          }

          const markets = fs.readFileSync("lib/markets.ts", "utf8");
          const prime = markets.indexOf("  prime: {");
          const standard = markets.indexOf("  standard: {");
          const growth = markets.indexOf("  growth: {");
          if (!(prime >= 0 && prime < standard && standard < growth)) {
            errors.push("lib/markets.ts: marketList order is not prime -> standard -> growth");
          }

          if (errors.length) {
            console.error(errors.join("\n"));
            process.exit(1);
          }
          console.log("market display order: prime -> standard -> growth");
          EOF

          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.scripts = p.scripts || {};
            p.scripts["audit:market-order"] = "tsx scripts/audit-market-display-order.ts";
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '

      - name: Remove one-time workflow
        run: rm .github/workflows/normalize-market-display-order.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Standardize market order as Prime Standard Growth"
          git push
