name: Fix peer and history comparison

on:
  push:
    paths:
      - ".github/workflows/fix-peer-and-history-comparison.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          peer = Path('app/api/company/[ticker]/peer-comparison/route.ts')
          text = peer.read_text()

          if 'loadAllSupabaseRows' not in text:
              text = text.replace(
                  'import { supabaseAdmin } from "@/lib/supabase";\n',
                  'import { supabaseAdmin } from "@/lib/supabase";\nimport { loadAllSupabaseRows } from "@/lib/load-all-supabase-rows";\n'
              )

          old_query = '''  const { data: peers, error: peerError } = await supabaseAdmin
    .from("company_analyses")
    .select("ticker, company_name, score, danger_score, financials, risk_level")
    .neq("ticker", ticker)
    .neq("risk_level", "EXCLUDED")
    .order("score", { ascending: false, nullsFirst: false })
    .limit(300);

  if (peerError) {
    return NextResponse.json({ error: "peer fetch failed" }, { status: 500 });
  }

  const targetCompany = target as CompanyRow;
  const candidatePeers = (peers ?? []) as CompanyRow[];'''

          new_query = '''  const candidatePeers = await loadAllSupabaseRows<CompanyRow>(
    "比較候補全社取得失敗",
    (from, to) =>
      supabaseAdmin
        .from("company_analyses")
        .select("ticker, company_name, score, danger_score, financials, risk_level")
        .neq("ticker", ticker)
        .neq("risk_level", "EXCLUDED")
        .order("ticker", { ascending: true })
        .range(from, to)
  );

  const targetCompany = target as CompanyRow;'''

          if old_query not in text:
              raise SystemExit('peer query block not found')
          text = text.replace(old_query, new_query)

          old_broad = '''  if (!Number.isFinite(financial) && !Number.isFinite(growth)) {
    return Number.POSITIVE_INFINITY;
  }

  const dangerGap = comparableGap('''
          new_broad = '''  const scoreGap = comparableGap(num(target.score), num(peer.score));

  if (!Number.isFinite(financial) && !Number.isFinite(growth)) {
    const dangerOnlyGap = comparableGap(num(target.danger_score), num(peer.danger_score));
    if (scoreGap === null && dangerOnlyGap === null) return Number.POSITIVE_INFINITY;
    return (scoreGap ?? 50) + (dangerOnlyGap ?? 20) * 0.5;
  }

  const dangerGap = comparableGap('''
          if old_broad not in text:
              raise SystemExit('broad distance block not found')
          text = text.replace(old_broad, new_broad)
          peer.write_text(text)

          page = Path('app/company/[ticker]/page.tsx')
          p = page.read_text()

          marker = '''function getLatestAndPrevious(history: any[]) {
  if (!Array.isArray(history) || history.length < 2) {
    return { latest: null, previous: null };
  }

  const sorted = [...history].sort(
    (a, b) => Number(a.year ?? 0) - Number(b.year ?? 0)
  );

  return {
    previous: sorted[sorted.length - 2],
    latest: sorted[sorted.length - 1],
  };
}
'''

          replacement = '''function historyKey(row: any) {
  return String(row?.periodEnd ?? row?.fiscalYear ?? row?.year ?? "");
}

function sameCoreFinancials(a: any, b: any) {
  return ["revenue", "operatingIncome", "operatingCF"].every((key) => {
    const left = typeof a?.[key] === "number" ? a[key] : null;
    const right = typeof b?.[key] === "number" ? b[key] : null;
    return left === right;
  });
}

function buildDisplayHistory(history: any[], financials: any) {
  const rows = Array.isArray(history) ? history.filter(Boolean) : [];
  const sorted = [...rows].sort((a, b) => historyKey(a).localeCompare(historyKey(b)));
  const current = {
    year: financials?.fiscalYear ?? financials?.year ?? "latest",
    fiscalYear: financials?.fiscalYear ?? financials?.year ?? null,
    periodEnd: financials?.periodEnd ?? null,
    revenue: financials?.revenue ?? null,
    operatingIncome: financials?.operatingIncome ?? null,
    operatingCF: financials?.operatingCF ?? null,
  };

  const hasCurrentValue = [current.revenue, current.operatingIncome, current.operatingCF].some(
    (value) => typeof value === "number"
  );
  const latest = sorted.at(-1);
  if (hasCurrentValue && (!latest || !sameCoreFinancials(latest, current))) {
    sorted.push(current);
  }
  return sorted;
}

function getLatestAndPrevious(history: any[]) {
  if (!Array.isArray(history) || history.length < 2) {
    return { latest: null, previous: null };
  }
  return {
    previous: history[history.length - 2],
    latest: history[history.length - 1],
  };
}
'''
          if marker not in p:
              raise SystemExit('history helper block not found')
          p = p.replace(marker, replacement)
          p = p.replace('  const history = data.history ?? [];', '  const history = buildDisplayHistory(data.history ?? [], financials);')
          page.write_text(p)
          PY

      - name: Add regression audit
        run: |
          cat > scripts/audit-company-comparison-coverage.ts <<'EOF'
          import fs from "node:fs";

          const peer = fs.readFileSync("app/api/company/[ticker]/peer-comparison/route.ts", "utf8");
          const page = fs.readFileSync("app/company/[ticker]/page.tsx", "utf8");
          const errors: string[] = [];

          if (peer.includes(".limit(300)")) errors.push("peer comparison still limits candidates to 300");
          if (!peer.includes("loadAllSupabaseRows<CompanyRow>")) errors.push("peer comparison does not load all companies");
          if (!peer.includes("dangerOnlyGap")) errors.push("peer comparison has no sparse-data fallback");
          if (!page.includes("buildDisplayHistory(data.history ?? [], financials)")) errors.push("company page does not merge latest financials into history");

          if (errors.length) {
            console.error(errors.join("\n"));
            process.exit(1);
          }
          console.log("company comparison coverage audit: OK");
          EOF

          node - <<'NODE'
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          p.scripts['audit:company-comparison'] = 'tsx scripts/audit-company-comparison-coverage.ts';
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          NODE

      - name: Remove workflow and commit
        run: |
          rm .github/workflows/fix-peer-and-history-comparison.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix company peers and two-period comparison"
          git push
