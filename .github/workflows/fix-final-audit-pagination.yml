name: Fix final audit pagination

on:
  push:
    paths:
      - ".github/workflows/fix-final-audit-pagination.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch final audit
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/audit-final.ts')
          text = path.read_text()
          text = text.replace(
              'import path from "node:path";\n',
              'import path from "node:path";\nimport { loadAllSupabaseRows } from "../lib/load-all-supabase-rows";\n',
          )
          old = '''  const supabase = createClient(url, key);\n  const { data, error } = await supabase\n    .from("company_analyses")\n    .select("ticker, company_name, score, risk_level, history")\n    .neq("risk_level", "EXCLUDED")\n    .order("ticker", { ascending: true });\n\n  if (error) {\n    add(items, "ERROR", "DB", `company_analyses fetch failed: ${error.message}`);\n    return;\n  }\n\n  const companies = (data ?? []) as Company[];\n'''
          new = '''  const supabase = createClient(url, key);\n  let companies: Company[];\n\n  try {\n    companies = await loadAllSupabaseRows<Company>(\n      "company_analyses fetch failed",\n      (from, to) =>\n        supabase\n          .from("company_analyses")\n          .select("ticker, company_name, score, risk_level, history")\n          .neq("risk_level", "EXCLUDED")\n          .order("ticker", { ascending: true })\n          .range(from, to)\n    );\n  } catch (error) {\n    add(\n      items,\n      "ERROR",\n      "DB",\n      error instanceof Error ? error.message : "company_analyses fetch failed"\n    );\n    return;\n  }\n'''
          if old not in text:
              raise SystemExit('target block not found')
          path.write_text(text.replace(old, new))
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/fix-final-audit-pagination.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/audit-final.ts .github/workflows/fix-final-audit-pagination.yml
          git commit -m "Audit all company rows in final audit"
          git push
