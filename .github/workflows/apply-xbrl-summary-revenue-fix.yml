name: Apply XBRL Summary Revenue Fix

on:
  push:
    branches:
      - agent/fix-market-rankings-global-search
    paths:
      - "scripts/apply-xbrl-summary-revenue-fix.mjs"
      - ".github/workflows/apply-xbrl-summary-revenue-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-market-rankings-global-search
          fetch-depth: 0
      - run: node scripts/apply-xbrl-summary-revenue-fix.mjs
      - run: npm ci
      - run: npm run check:market-ranking-parser
      - run: npx tsx scripts/check-operating-revenue-profile.ts
      - name: Commit patched parser
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/edinet-parser.ts
          git commit -m "Read XBRL summary revenue for rankings"
          git push origin HEAD:agent/fix-market-rankings-global-search
