name: All Markets EDINET Backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: "今日から遡る日数（初回は400推奨）"
        required: true
        default: "30"
      continue_on_error:
        description: "個別日の失敗後も継続する"
        required: true
        type: boolean
        default: true

concurrency:
  group: all-markets-edinet-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backfill EDINET annual reports
        shell: bash
        run: |
          args=("--days=${{ inputs.days }}")
          if [[ "${{ inputs.continue_on_error }}" == "true" ]]; then
            args+=("--continue-on-error")
          fi
          DOTENV_CONFIG_PATH=.env.local npx tsx scripts/backfill-all-markets-edinet.ts "${args[@]}"

      - name: Audit all-market coverage
        if: always()
        run: npm run audit:all-markets-data
