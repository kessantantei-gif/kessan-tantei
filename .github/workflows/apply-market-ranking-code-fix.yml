name: Apply Market Ranking Code Fix

on:
  push:
    branches:
      - agent/fix-market-rankings-global-search
    paths:
      - "scripts/apply-market-ranking-code-fix.mjs"
      - ".github/workflows/apply-market-ranking-code-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-market-rankings-global-search
          fetch-depth: 0

      - name: Apply deterministic patch
        run: node scripts/apply-market-ranking-code-fix.mjs

      - name: Install dependencies
        run: npm ci

      - name: Validate parser
        run: npm run check:market-ranking-parser

      - name: Commit patched files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/edinet-parser.ts scripts/analyze-company.ts components/market-ranking-page.tsx
          git commit -m "Fix Prime and Standard ranking metrics"
          git push origin HEAD:agent/fix-market-rankings-global-search
