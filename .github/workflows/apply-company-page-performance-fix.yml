name: Apply Company Page Performance Fix

on:
  push:
    branches:
      - agent/fix-company-page-performance
    paths:
      - "scripts/apply-company-page-performance-fix.mjs"
      - ".github/workflows/apply-company-page-performance-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-company-page-performance
          fetch-depth: 0
      - run: node scripts/apply-company-page-performance-fix.mjs
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Commit optimized company page
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/company/[ticker]/page.tsx
          git commit -m "Speed up company page initial render"
          git push origin HEAD:agent/fix-company-page-performance
