name: Apply mobile board order fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mobile-board-order
          fetch-depth: 0

      - name: Replace brittle mobile ordering
        run: |
          python <<'PY'
          from pathlib import Path

          page_path = Path('app/company/[ticker]/page.tsx')
          page = page_path.read_text()

          replacements = [
            (
              '<div className="grid min-w-0 gap-4 lg:grid-cols-[minmax(0,1.35fr)_minmax(320px,420px)] lg:gap-5">',
              '<div data-company-section="overview" className="grid min-w-0 gap-4 lg:grid-cols-[minmax(0,1.35fr)_minmax(320px,420px)] lg:gap-5">',
            ),
            (
              '<div className="mt-4 grid min-w-0 gap-4 lg:grid-cols-3">',
              '<div data-company-section="financial-trends" className="mt-4 grid min-w-0 gap-4 lg:grid-cols-3">',
            ),
            (
              '<div className="mt-4 grid min-w-0 gap-4 lg:grid-cols-2">\n          <Panel title="決算探偵の見立て">',
              '<div data-company-section="financial-details" className="mt-4 grid min-w-0 gap-4 lg:grid-cols-2">\n          <Panel title="決算探偵の見立て">',
            ),
          ]
          for old, new in replacements:
            if old not in page:
              raise RuntimeError(f'marker not found: {old[:60]}')
            page = page.replace(old, new, 1)

          start_marker = '        <div className="mt-4 rounded-3xl border border-purple-400/20 bg-purple-500/10 p-4 backdrop-blur-xl sm:p-6">'
          end_marker = '        <p className="mt-4 rounded-2xl border border-white/10 bg-black/20 px-4 py-3 text-xs leading-6 text-slate-400">'
          start = page.index(start_marker)
          end = page.index(end_marker, start)

          replacement = '''        <div data-company-priority-flow="true" className="mt-4 min-w-0">
          <div data-company-section="earnings" className="rounded-3xl border border-purple-400/20 bg-purple-500/10 p-4 backdrop-blur-xl sm:p-6">
            <p className="text-[11px] tracking-[0.24em] text-purple-300 sm:text-sm">EARNINGS CHANGE</p>
            <h2 className="mt-2 text-2xl font-black sm:text-3xl">決算変化速報</h2>
            {canShowProDetail ? (
              latest && previous ? (
                <div className="mt-5 grid gap-3 sm:grid-cols-3">
                  <ChangeMetric label="売上高" current={yenOku(latest.revenue ?? 0)} previous={yenOku(previous.revenue ?? 0)} change={formatPct(pctChange(latest.revenue ?? 0, previous.revenue ?? 0))} />
                  <ChangeMetric label="営業利益" current={yenOku(latest.operatingIncome ?? 0)} previous={yenOku(previous.operatingIncome ?? 0)} change={metricChangeLabel(latest.operatingIncome ?? 0, previous.operatingIncome ?? 0)} />
                  <ChangeMetric label="営業CF" current={yenOku(latest.operatingCF ?? 0)} previous={yenOku(previous.operatingCF ?? 0)} change={metricChangeLabel(latest.operatingCF ?? 0, previous.operatingCF ?? 0)} />
                </div>
              ) : (
                <p className="mt-4 text-slate-400">比較できる履歴データが不足しています。</p>
              )
            ) : (
              <ProLock title="決算変化速報はPro限定です" message="最新期と前期の変化、赤字転落・黒字化・CF悪化などをProで確認できます。" />
            )}
          </div>

          <div data-company-section="ai-analysis">
            <Panel title="AI詳細財務分析">
              {aiPermission.allowed ? (
                <pre className="whitespace-pre-wrap break-words leading-8 text-slate-300">{aiAnalysis}</pre>
              ) : (
                <ProLock title="AI詳細分析はPro限定です" message="無料では1日1回まで。Proなら全銘柄の詳細分析を制限なく確認できます。" />
              )}
            </Panel>
          </div>

          <div data-company-section="news">
            <Panel title="ニュース / IR要約">
              <div className="space-y-4">
                {companyNews.length === 0 ? (
                  <p className="text-slate-400">関連ニュースはまだ取得されていません。</p>
                ) : (
                  companyNews.map((item) => (
                    <a key={item.url} href={item.url} target="_blank" rel="noreferrer" className="block rounded-2xl border border-white/10 bg-black/20 p-4 transition hover:border-green-400/40">
                      <p className="text-sm text-slate-500">{formatNewsDate(item.published_at)}</p>
                      <p className="mt-1 font-black text-white">{item.title}</p>
                      <p className="mt-2 text-sm leading-6 text-slate-400">{item.summary}</p>
                    </a>
                  ))
                )}
              </div>
            </Panel>
          </div>

          <div data-company-section="board" className="rounded-3xl border border-white/10 bg-white/5 p-4 backdrop-blur-xl sm:p-6">
            <h2 className="text-2xl font-black">みんなのコメント</h2>
            <p className="mt-2 text-sm leading-6 text-slate-400">{boardSummary}</p>
            <CompanyBoard ticker={data.ticker} companyName={data.company_name} comments={comments as BoardComment[]} isLoggedIn={isLoggedIn} />
          </div>
        </div>

'''
          page = page[:start] + replacement + page[end:]
          page = page.replace(end_marker, '        <p data-company-section="disclaimer" className="mt-4 rounded-2xl border border-white/10 bg-black/20 px-4 py-3 text-xs leading-6 text-slate-400">', 1)
          page_path.write_text(page)

          css_path = Path('app/globals.css')
          css = css_path.read_text()
          start = css.index('@media (max-width: 640px) {')
          depth = 0
          end = None
          for index in range(start, len(css)):
            if css[index] == '{':
              depth += 1
            elif css[index] == '}':
              depth -= 1
              if depth == 0:
                end = index + 1
                break
          if end is None:
            raise RuntimeError('mobile CSS block is not closed')

          semantic_css = r'''/* Stable semantic company layout: avoids Safari display:contents ordering bugs. */
main[data-company-page="true"] [data-company-priority-flow="true"] {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  grid-template-areas: "earnings earnings" "ai news" "board board";
  gap: 1rem;
}
main[data-company-page="true"] [data-company-section="earnings"] { grid-area: earnings; }
main[data-company-page="true"] [data-company-section="ai-analysis"] { grid-area: ai; min-width: 0; }
main[data-company-page="true"] [data-company-section="news"] { grid-area: news; min-width: 0; }
main[data-company-page="true"] [data-company-section="board"] { grid-area: board; min-width: 0; }

@media (max-width: 640px) {
  main[data-company-page="true"] { width: 100%; max-width: 100dvw; overflow-x: hidden; }
  main[data-company-page="true"] > section {
    display: flex;
    max-width: 100%;
    flex-direction: column;
    padding: 0.75rem 0.625rem 1rem;
  }
  main[data-company-page="true"] [data-company-section="overview"] { order: 1; }
  main[data-company-page="true"] [data-company-priority-flow="true"] {
    order: 2;
    grid-template-columns: minmax(0, 1fr);
    grid-template-areas: "news" "board" "earnings" "ai";
    gap: 0.75rem;
    margin-top: 0.75rem;
  }
  main[data-company-page="true"] [data-company-section="financial-trends"] { order: 3; margin-top: 0.75rem; }
  main[data-company-page="true"] [data-company-section="financial-details"] { order: 4; margin-top: 0.75rem; }
  main[data-company-page="true"] [data-company-section="disclaimer"] { order: 5; margin-top: 0.75rem; }

  main[data-company-page="true"] h1,
  main[data-company-page="true"] h2,
  main[data-company-page="true"] h3,
  main[data-company-page="true"] p,
  main[data-company-page="true"] span,
  main[data-company-page="true"] li { word-break: normal; overflow-wrap: break-word; }

  main[data-company-page="true"] [data-company-section="overview"],
  main[data-company-page="true"] [data-company-section="financial-trends"],
  main[data-company-page="true"] [data-company-section="financial-details"] { gap: 0.75rem; }

  main[data-company-page="true"] [data-company-section="overview"] > :first-child,
  main[data-company-page="true"] [data-company-section="financial-trends"] > div,
  main[data-company-page="true"] [data-company-section="financial-details"] > div,
  main[data-company-page="true"] [data-company-section="earnings"],
  main[data-company-page="true"] [data-company-section="ai-analysis"] > div,
  main[data-company-page="true"] [data-company-section="news"] > div,
  main[data-company-page="true"] [data-company-section="board"] {
    border-radius: 1.25rem;
    padding: 0.875rem;
  }

  main[data-company-page="true"] [data-company-section="overview"] > :first-child > :nth-child(4) {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0.5rem;
  }
  main[data-company-page="true"] [data-company-section="overview"] > :first-child > :nth-child(5) {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.5rem;
  }
  main[data-company-page="true"] [data-company-section="overview"] > :first-child > :nth-child(4) > div,
  main[data-company-page="true"] [data-company-section="overview"] > :first-child > :nth-child(5) > div {
    padding: 0.625rem 0.5rem;
  }
  main[data-company-page="true"] [data-company-section="overview"] > :nth-child(2) [class~="h-36"][class~="w-36"] {
    width: 6.75rem;
    height: 6.75rem;
    margin: 0.75rem 0;
  }
  main[data-company-page="true"] [data-company-section="news"] a { padding: 0.75rem; }
  main[data-company-page="true"] [data-company-section="board"] > div { margin-top: 0.75rem; padding: 0.75rem; }

  main[data-company-page="true"] button,
  main[data-company-page="true"] a {
    touch-action: manipulation;
    transition: transform 120ms, opacity 120ms, border-color 120ms, background-color 120ms;
  }
  main[data-company-page="true"] button:active,
  main[data-company-page="true"] a:active { transform: scale(0.97); opacity: 0.82; }
}
'''
          css_path.write_text(css[:start] + semantic_css + css[end:])
          Path('.github/workflows/apply-mobile-board-order-fix.yml').unlink()
          PY

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/company/'[ticker]'/page.tsx app/globals.css .github/workflows/apply-mobile-board-order-fix.yml
          git commit -m "Fix mobile company board ordering"
          git push origin HEAD:agent/fix-mobile-board-order
