name: Production Acceptance Audit

on:
  workflow_dispatch:

concurrency:
  group: production-acceptance-audit
  cancel-in-progress: true

jobs:
  production-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}
      STRIPE_LAUNCH_COUPON_ID: ${{ secrets.STRIPE_LAUNCH_COUPON_ID }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run read-only production audits
        shell: bash
        run: |
          mkdir -p reports
          set +e

          run_check() {
            local name="$1"
            shift
            echo "===== ${name} =====" | tee -a reports/production-audit-summary.txt
            "$@" 2>&1 | tee "reports/${name}.log"
            local code=${PIPESTATUS[0]}
            echo "exit_code=${code}" | tee -a reports/production-audit-summary.txt
            echo | tee -a reports/production-audit-summary.txt
            return ${code}
          }

          failed=0
          run_check phase1-all-markets npm run audit:phase1-all-markets || failed=1
          run_check phase2-market-master npm run audit:phase2-market-master || failed=1
          run_check all-markets-data npm run audit:all-markets-data || failed=1
          run_check financial-integrity npm run audit:financial-integrity || failed=1
          run_check history-periods npm run audit:history-periods || failed=1
          run_check phase4 npm run audit:phase4 || failed=1
          run_check phase7 npm run audit:phase7 || failed=1
          run_check phase8 npm run audit:phase8 || failed=1
          run_check phase9 npm run audit:phase9 || failed=1
          run_check phase10 npm run audit:phase10 || failed=1
          run_check stripe npm run audit:stripe || failed=1
          run_check seo npm run audit:seo || failed=1
          run_check release npm run audit:release || failed=1
          run_check final npm run audit:final || failed=1
          run_check phase16-all-markets npm run audit:phase16-all-markets || failed=1

          exit ${failed}

      - name: Verify production HTTP endpoints
        if: always()
        shell: bash
        run: |
          mkdir -p reports
          base="${NEXT_PUBLIC_APP_URL:-https://kessan-tantei.jp}"
          failed=0
          for path in / /markets /growth /standard /standard/ranking /prime /prime/ranking /ranking /pricing /features /themes /updates /privacy /terms /legal /disclaimer /robots.txt /sitemap.xml; do
            url="${base%/}${path}"
            code=$(curl --location --silent --show-error --output /tmp/body --write-out "%{http_code}" --retry 4 --retry-delay 5 --retry-all-errors --max-time 30 "$url" || true)
            bytes=$(wc -c < /tmp/body 2>/dev/null || echo 0)
            printf '%s\t%s\t%s bytes\n' "$code" "$url" "$bytes" | tee -a reports/http-smoke.txt
            if [[ ! "$code" =~ ^(200|301|302|307|308)$ ]]; then
              failed=1
            fi
          done
          exit ${failed}

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-acceptance-audit-${{ github.sha }}
          path: reports/
          if-no-files-found: error
          retention-days: 30
