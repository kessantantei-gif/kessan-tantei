name: Apply final news fixes

on:
  push:
    paths:
      - ".github/workflows/apply-news-fixes-final.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply fixes
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          news_path = Path('app/news/page.tsx')
          news = news_path.read_text()
          news = news.replace(
              'import Link from "next/link";\nimport { supabaseAdmin } from "@/lib/supabase";\nimport { isBlockedNews } from "@/lib/news-filter";',
              'import Link from "next/link";\nimport NewsSearchForm from "@/components/news-search-form";\nimport { supabaseAdmin } from "@/lib/supabase";\nimport { isBlockedNews } from "@/lib/news-filter";\nimport { loadAllSupabaseRows } from "@/lib/load-all-supabase-rows";'
          )

          start = news.index('async function loadCompanySearchTickers')
          end = news.index('\nasync function loadNewsPage', start)
          replacement = '''async function loadListedCompanies() {
            return loadAllSupabaseRows<CompanyMaster>(
              "ニュース検索会社マスタ取得失敗",
              (from, to) =>
                supabaseAdmin
                  .from("all_market_companies")
                  .select("ticker, company_name, market_segment")
                  .eq("listing_status", "listed")
                  .in("market_segment", ["growth", "standard", "prime"])
                  .order("ticker", { ascending: true })
                  .range(from, to)
            );
          }

          function toKatakana(value: string) {
            return value.replace(/[ぁ-ゖ]/g, (char) =>
              String.fromCharCode(char.charCodeAt(0) + 0x60)
            );
          }

          function normalizeCompanySearch(value: string) {
            return toKatakana(value)
              .toLowerCase()
              .normalize("NFKC")
              .replace(/[‐‑‒–—―ーｰ]/g, "")
              .replace(/[・,，.．/／()（）\\[\\]【】「」『』'’`´\\s　]/g, "")
              .replace(/株式会社|有限会社|合同会社|ホールディングス|グループ/g, "");
          }

          function isSubsequence(query: string, target: string) {
            if (!query) return true;
            let index = 0;
            for (const char of target) {
              if (char === query[index]) index += 1;
              if (index === query.length) return true;
            }
            return false;
          }

          function companyMatches(company: CompanyMaster, query: string) {
            const normalizedQuery = normalizeCompanySearch(query);
            if (!normalizedQuery) return false;
            const ticker = normalizeCompanySearch(company.ticker);
            const name = normalizeCompanySearch(company.company_name);
            return (
              ticker.includes(normalizedQuery) ||
              name.includes(normalizedQuery) ||
              (normalizedQuery.length >= 2 && isSubsequence(normalizedQuery, name))
            );
          }

          async function loadCompanySearchTickers(
            query: string,
            market: MarketSlug,
            companies: CompanyMaster[]
          ) {
            if (!query) return null;
            const tickers = companies
              .filter((company) => market === "all" || company.market_segment === market)
              .filter((company) => companyMatches(company, query))
              .map((company) => company.ticker);
            return tickers.length > 0 ? tickers : null;
          }
          '''
          news = news[:start] + replacement + news[end:]

          news = news.replace(
              'const [marketTickers, companySearchTickers, totalCount] = await Promise.all([\n      loadMarketTickers(selectedMarket),\n      loadCompanySearchTickers(query, selectedMarket),\n      loadTotalNewsCount(),\n    ]);',
              'const [marketTickers, listedCompanies, totalCount] = await Promise.all([\n      loadMarketTickers(selectedMarket),\n      loadListedCompanies(),\n      loadTotalNewsCount(),\n    ]);\n    const companySearchTickers = await loadCompanySearchTickers(\n      query,\n      selectedMarket,\n      listedCompanies\n    );'
          )

          news = news.replace(
              '<form action="/news" method="get" className="mt-5 grid gap-3 sm:grid-cols-[1fr_auto]">\n            {selectedMarket !== "all" ? (\n              <input type="hidden" name="market" value={selectedMarket} />\n            ) : null}\n            <input\n              type="search"\n              name="q"\n              defaultValue={query}\n              placeholder="会社名・証券コード・ニュース見出しで検索"\n              className="min-h-12 rounded-2xl border border-white/10 bg-black/30 px-4 text-white outline-none placeholder:text-slate-500 focus:border-cyan-400/60"\n            />\n            <button\n              type="submit"\n              className="min-h-12 rounded-2xl bg-cyan-300 px-6 font-black text-slate-950 transition hover:bg-cyan-200"\n            >\n              検索\n            </button>\n          </form>',
              '<NewsSearchForm\n            companies={listedCompanies}\n            market={selectedMarket}\n            initialQuery={query}\n          />'
          )
          news_path.write_text(news)

          market_path = Path('components/market-building-page.tsx')
          market = market_path.read_text()
          old = '''  const tickerSet = new Set(companies.map((company) => company.ticker));
            const { data: recentNews } = await supabaseAdmin
              .from("growth_news")
              .select("id, ticker, title, url, source, published_at")
              .not("url", "is", null)
              .order("published_at", { ascending: false, nullsFirst: false })
              .limit(300);

            const news = ((recentNews ?? []) as NewsItem[])
              .filter((item) => item.ticker && tickerSet.has(item.ticker))
              .slice(0, 3);'''
          new = '''  const tickers = companies.map((company) => company.ticker);
            const tickerChunks: string[][] = [];
            for (let index = 0; index < tickers.length; index += 100) {
              tickerChunks.push(tickers.slice(index, index + 100));
            }

            const newsBatches = await Promise.all(
              tickerChunks.map(async (tickerChunk) => {
                const { data, error } = await supabaseAdmin
                  .from("growth_news")
                  .select("id, ticker, title, url, source, published_at")
                  .in("ticker", tickerChunk)
                  .not("url", "is", null)
                  .order("published_at", { ascending: false, nullsFirst: false })
                  .limit(10);

                if (error) throw new Error(`${marketSlug}ニュース取得失敗: ${error.message}`);
                return (data ?? []) as NewsItem[];
              })
            );

            const news = newsBatches
              .flat()
              .sort((a, b) => {
                const aTime = a.published_at ? new Date(a.published_at).getTime() : 0;
                const bTime = b.published_at ? new Date(b.published_at).getTime() : 0;
                return bTime - aTime;
              })
              .slice(0, 3);'''
          if old not in market:
              raise SystemExit('market news block not found')
          market = market.replace(old, new)
          market_path.write_text(market)

          Path('.github/workflows/apply-news-fixes-final.yml').unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/news/page.tsx components/market-building-page.tsx .github/workflows/apply-news-fixes-final.yml
          git commit -m "Fix news search and latest market news ordering"
          git push
