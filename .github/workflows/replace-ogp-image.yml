name: Replace OGP image with all-market version

on:
  push:
    paths:
      - ".github/workflows/replace-ogp-image.yml"

permissions:
  contents: write

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install image dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install pillow

      - name: Generate all-market OGP image
        run: |
          python - <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          import math

          width, height = 1200, 630
          image = Image.new("RGB", (width, height), "#050816")
          pixels = image.load()

          glows = [
              (1010, 90, 420, (34, 211, 238), 0.18),
              (180, 120, 380, (34, 197, 94), 0.16),
              (850, 560, 500, (139, 92, 246), 0.14),
          ]

          for y in range(height):
              for x in range(width):
                  red, green, blue = 5, 8, 22
                  for cx, cy, radius, color, strength in glows:
                      distance = math.hypot(x - cx, y - cy)
                      alpha = max(0, 1 - distance / radius) * strength
                      red += int(color[0] * alpha)
                      green += int(color[1] * alpha)
                      blue += int(color[2] * alpha)
                  pixels[x, y] = (min(255, red), min(255, green), min(255, blue))

          draw = ImageDraw.Draw(image, "RGBA")
          for x in range(0, width, 60):
              draw.line((x, 0, x, height), fill=(255, 255, 255, 8), width=1)
          for y in range(0, height, 60):
              draw.line((0, y, width, y), fill=(255, 255, 255, 8), width=1)

          bold = "/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc"
          regular = "/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc"
          font_badge = ImageFont.truetype(bold, 28)
          font_title = ImageFont.truetype(bold, 78)
          font_heading = ImageFont.truetype(bold, 44)
          font_body = ImageFont.truetype(regular, 28)
          font_chip = ImageFont.truetype(bold, 26)

          draw.rounded_rectangle(
              (70, 58, 365, 108),
              radius=25,
              fill=(255, 255, 255, 15),
              outline=(34, 211, 238, 90),
              width=2,
          )
          draw.text((95, 67), "KESSAN TANTEI", font=font_badge, fill=(103, 232, 249, 255))
          draw.text((70, 155), "決算探偵", font=font_title, fill=(255, 255, 255, 255))
          draw.text((72, 267), "日本株全市場の財務分析", font=font_heading, fill=(241, 245, 249, 255))
          draw.text(
              (74, 342),
              "グロース・スタンダード・プライム対応",
              font=font_body,
              fill=(203, 213, 225, 255),
          )

          chips = [
              ("成長性", 70, 135, (34, 197, 94)),
              ("収益性", 235, 135, (34, 211, 238)),
              ("営業CF", 400, 135, (139, 92, 246)),
              ("財務安全性", 565, 180, (249, 115, 22)),
              ("リスク", 775, 135, (244, 63, 94)),
          ]
          for label, x, chip_width, color in chips:
              draw.rounded_rectangle(
                  (x, 425, x + chip_width, 477),
                  radius=26,
                  fill=(*color, 35),
                  outline=(*color, 110),
                  width=2,
              )
              box = draw.textbbox((0, 0), label, font=font_chip)
              text_x = x + (chip_width - (box[2] - box[0])) / 2
              draw.text((text_x, 435), label, font=font_chip, fill=(255, 255, 255, 245))

          draw.text((72, 536), "kessan-tantei.jp", font=font_badge, fill=(148, 163, 184, 255))

          for index, (bar_height, color) in enumerate(
              [(170, (34, 197, 94)), (120, (34, 211, 238)), (85, (139, 92, 246))]
          ):
              x = 990 + index * 55
              draw.rounded_rectangle(
                  (x, 510 - bar_height, x + 34, 510),
                  radius=17,
                  fill=(*color, 210),
              )
          draw.line((960, 510, 1160, 510), fill=(255, 255, 255, 80), width=3)

          image.save("public/og-image-all-markets.png", optimize=True)
          PY

      - name: Update all OGP references
        run: |
          python - <<'PY'
          from pathlib import Path

          extensions = {".ts", ".tsx", ".js", ".jsx", ".json", ".md", ".yml", ".yaml"}
          workflow = Path(".github/workflows/replace-ogp-image.yml")

          for path in Path(".").rglob("*"):
              if not path.is_file() or ".git" in path.parts or path == workflow:
                  continue
              if path.suffix not in extensions:
                  continue
              text = path.read_text(encoding="utf-8")
              updated = text.replace("og-image.png", "og-image-all-markets.png")
              if updated != text:
                  path.write_text(updated, encoding="utf-8")
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/replace-ogp-image.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/og-image-all-markets.png app components scripts .github/workflows/replace-ogp-image.yml
          git commit -m "Replace social share image for all-market coverage"
          git push
