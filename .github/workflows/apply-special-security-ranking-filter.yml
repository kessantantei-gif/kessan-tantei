name: Apply special security ranking filter

on:
  push:
    paths:
      - ".github/workflows/apply-special-security-ranking-filter.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Connect shared ranking loader
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          growth_files = [
              Path("app/ranking/page.tsx"),
              Path("app/ranking/[type]/page.tsx"),
          ]

          for path in growth_files:
              text = path.read_text()
              text = text.replace(
                  'import { supabaseAdmin } from "@/lib/supabase";\nimport { loadAllSupabaseRows } from "@/lib/load-all-supabase-rows";\n',
                  'import { loadRankingCompanies } from "@/lib/load-ranking-companies";\n',
              )
              text = re.sub(
                  r'\nasync function loadCompanies\(\) \{.*?\n\}\n',
                  '\n',
                  text,
                  count=1,
                  flags=re.S,
              )
              text = text.replace(
                  'const companies = await loadCompanies();',
                  'const companies = await loadRankingCompanies("growth");',
              )
              path.write_text(text)

          market_path = Path("components/market-ranking-page.tsx")
          text = market_path.read_text()
          text = text.replace(
              'import { supabaseAdmin } from "@/lib/supabase";\nimport { loadAllSupabaseRows } from "@/lib/load-all-supabase-rows";\n',
              'import { loadRankingCompanies } from "@/lib/load-ranking-companies";\n',
          )
          text = re.sub(
              r'\nasync function loadCompanies\(marketSlug: MarketPageSlug\) \{.*?\n\}\n',
              '\n',
              text,
              count=1,
              flags=re.S,
          )
          text = text.replace(
              'loadCompanies(marketSlug)',
              'loadRankingCompanies(marketSlug)',
          )
          market_path.write_text(text)
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-special-security-ranking-filter.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/ranking/page.tsx 'app/ranking/[type]/page.tsx' components/market-ranking-page.tsx .github/workflows/apply-special-security-ranking-filter.yml
          git commit -m "Exclude REIT and foreign issuers from rankings"
          git push
