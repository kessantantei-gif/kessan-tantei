name: Financial Sector Data Repair

on:
  push:
    branches:
      - main
      - agent/fix-financial-sector-data
    paths:
      - "lib/edinet-parser.ts"
      - "lib/edinet-financial-parser.ts"
      - "lib/redflag-engine.ts"
      - "scripts/reprocess-financial-sector-data.ts"
      - "scripts/check-financial-sector-parser.ts"
      - "scripts/audit-financial-sector-data.ts"
      - "scripts/diagnose-financial-sector-tags.ts"
      - ".github/workflows/financial-sector-repair.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: financial-sector-data-repair
  cancel-in-progress: true

jobs:
  apply-taxonomy-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/run-financial-sector-repair'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.patch.outputs.changed }}
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/run-financial-sector-repair
          fetch-depth: 0

      - name: Apply deterministic taxonomy patch
        id: patch
        shell: bash
        run: |
          node scripts/fix-financial-sector-patch-script.mjs
          node scripts/apply-financial-sector-taxonomy-fix.mjs
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/edinet-parser.ts lib/edinet-financial-parser.ts scripts/reprocess-financial-sector-data.ts scripts/audit-financial-sector-data.ts scripts/check-financial-sector-parser.ts scripts/apply-financial-sector-taxonomy-fix.mjs scripts/fix-financial-sector-patch-script.mjs
          git commit -m "Complete financial sector taxonomy support"
          git push origin HEAD:agent/run-financial-sector-repair

  repair:
    needs: apply-taxonomy-fix
    if: always() && (needs.apply-taxonomy-fix.result == 'skipped' || needs.apply-taxonomy-fix.outputs.changed != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate financial-sector parser
        run: npm run check:financial-sector-parser

      - name: Reprocess listed financial companies
        run: npm run repair:financial-sector-data

      - name: Audit financial-sector data
        id: financial-audit
        continue-on-error: true
        run: npm run audit:financial-sector-data

      - name: Diagnose remaining financial tags
        if: steps.financial-audit.outcome == 'failure'
        run: npm run diagnose:financial-sector-tags

      - name: Upload financial-sector audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: financial-sector-audit
          path: reports/financial-sector-audit.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload financial tag diagnostics
        if: steps.financial-audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: financial-sector-tag-diagnostics
          path: reports/financial-sector-tag-diagnostics.json
          if-no-files-found: error
          retention-days: 7

      - name: Fail when financial audit has issues
        if: steps.financial-audit.outcome == 'failure'
        run: exit 1
